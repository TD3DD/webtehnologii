<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Шахова дошка</title>
    <style>
        .chess-board { 
            border-collapse: collapse; 
            margin: 20px auto;         
            font-size: 45px;           
            text-align: center;       
            border: 2px solid #333;
        }
        
        .chess-board th { 
            padding: 10px; 
            font-size: 20px; 
            background-color: #f2f2f2; 
        }

        .chess-board td { 
            width: 70px; 
            height: 70px; 
        }

        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
    </style>
</head>
<body>

    <h2 align="center">Шахова партія (Міттельшпіль)</h2>

    <table class="chess-board">
        <tr>
            <th>8</th> <td class="light">♜</td> <td class="dark"></td>   <td class="light">♝</td> <td class="dark">♛</td>   <td class="light">♚</td> <td class="dark"></td>   <td class="light"></td>  <td class="dark">♜</td>   </tr>
        <tr>
            <th>7</th>
            <td class="dark">♟</td>
            <td class="light">♟</td>
            <td class="dark">♟</td>
            <td class="light"></td>
            <td class="dark">♟</td>
            <td class="light">♟</td>
            <td class="dark">♟</td>
            <td class="light"></td>
        </tr>
        <tr>
            <th>6</th>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light">♞</td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
        </tr>
        <tr>
            <th>5</th>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light">♟</td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
        </tr>
        <tr>
            <th>4</th>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark">♙</td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
        </tr>
        <tr>
            <th>3</th>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark">♘</td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
        </tr>
        <tr>
            <th>2</th>
            <td class="light">♙</td>
            <td class="dark">♙</td>
            <td class="light">♙</td>
            <td class="dark"></td>
            <td class="light">♙</td>
            <td class="dark">♙</td>
            <td class="light">♙</td>
            <td class="dark"></td>
        </tr>
        <tr>
            <th>1</th>
            <td class="dark">♖</td>
            <td class="light"></td>
            <td class="dark">♗</td>
            <td class="light">♕</td>
            <td class="dark">♔</td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light">♖</td>
        </tr>
        <tr>
            <th></th> <th>a</th>
            <th>b</th>
            <th>c</th>
            <th>d</th>
            <th>e</th>
            <th>f</th>
            <th>g</th>
            <th>h</th>
        </tr>
    </table>

</body>
</html>
